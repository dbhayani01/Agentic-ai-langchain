version: '3.9'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    env_file: .env
    depends_on:
      - db
      - redis
  frontend:
    build: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - backend
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_ai
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
volumes:
  pgdata:
